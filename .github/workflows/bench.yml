name: bench
# Native amd64 throughput on ubuntu-latest. The dev machine is arm64, so the
# amd64 SSE/AVX2 kernel only runs under Rosetta locally (and Rosetta hides AVX2),
# so this job produces the representative native numbers for the README
# Performance table.
on:
  push:
    branches: [main, bench]
  workflow_dispatch:
jobs:
  bench:
    runs-on: ubuntu-latest # native amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: grep -m1 -oE 'avx2|avx512[a-z]+' /proc/cpuinfo | sort -u | tr "\n" " "; echo
      - name: go env
        run: go env GOARCH GOAMD64
      - name: benchmark Valid
        run: go test -run '^$' -bench Valid -benchmem -count=6 ./...
      - name: benchmark RuneCount
        run: go test -run '^$' -bench RuneCount -benchmem -count=6 ./...
