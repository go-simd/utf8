name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: go vet ./...
      - run: go test -v ./...
      - run: go test -run '^$' -fuzz '^FuzzValid$' -fuzztime 15s ./...
      - run: go test -run '^$' -fuzz '^FuzzRuneCount$' -fuzztime 15s ./...
      - run: go test -run '^$' -fuzz '^FuzzRuneCountInString$' -fuzztime 15s ./...
      # amd64 only: fuzz the AVX2 kernels directly, so the AVX2 path is covered
      # even on a runner whose CPU reports no AVX2 (FuzzValidForceAVX2 /
      # FuzzRuneCountForceAVX2 live behind the amd64 build tag).
      - if: matrix.arch == 'amd64'
        run: go test -run '^$' -fuzz '^FuzzValidForceAVX2$' -fuzztime 15s ./...
      - if: matrix.arch == 'amd64'
        run: go test -run '^$' -fuzz '^FuzzRuneCountForceAVX2$' -fuzztime 15s ./...
      # The amd64 job covers the AVX2 + SSE + POPCNT dispatch (the Force tests
      # drive every branch even on a no-AVX2 runner); the arm64 job covers the
      # !amd64 generic fallback (utf8_generic.go). Gate on both so neither arch's
      # Go statements may slip below 100%.
      - name: coverage gate (100%)
        run: |
          go test -covermode=atomic -coverprofile=cov.out ./...
          pct=$(go tool cover -func=cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }
  # The arches with no native GitHub runner are built with the cross toolchain
  # and run under qemu via binfmt. ppc64le (VSX) and s390x (vector facility) have
  # baseline-SIMD kernels with no runtime dispatch; riscv64 and loong64 carry no
  # arch-specific kernel and exercise the generic unicode/utf8 fallback
  # (utf8_generic.go). All four run the full suite against unicode/utf8 on valid
  # AND invalid input (TestValidRuneCountDifferential runs 200k adversarial cases
  # plus the FuzzValid/FuzzRuneCount/FuzzRuneCountInString seed corpora). Mirrors
  # the go-simd/matchlen emulated job: debian:trixie with QEMU_CPU=power9
  # (ppc64le) / rv64,v=true,vlen=128 (riscv64), ghcr.io/loong64/debian:trixie
  # with la464 (loong64), and the default QEMU_CPU for s390x (do NOT pin z13/z14
  # — fatal under TCG).
  emulated:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: riscv64, image: "debian:trixie", qemu: "rv64,v=true,vlen=128" }
          - { arch: loong64, image: "ghcr.io/loong64/debian:trixie", qemu: "la464" }
          - { arch: ppc64le, image: "debian:trixie", qemu: "power9" }
          - { arch: s390x,   image: "debian:trixie", qemu: "qemu" }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: docker run --privileged --rm tonistiigi/binfmt --install ${{ matrix.arch }}
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go test -c -cover -o /tmp/t.test .
      - run: docker run --rm --platform linux/${{ matrix.arch }} -e QEMU_CPU=${{ matrix.qemu }} -v /tmp:/t ${{ matrix.image }} /t/t.test -test.v -test.coverprofile=/t/cov.out
      - name: coverage gate (100%)
        run: |
          pct=$(go tool cover -func=/tmp/cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }

  # POWER8 ISA-guard lane. The `emulated` ppc64le job runs the POWER9 model, so an
  # ISA-3.0 op illegal on POWER8 (LXVB16X/STXVB16X/CNTTZD) slips through there and
  # only SIGILLs on a real POWER8 (cfarm112). This lane runs the SAME ppc64le test
  # binary under QEMU_CPU=power8 (qemu-user honors QEMU_CPU; power8 == power8e ==
  # power8_v2.0): if a VSX kernel emits an ISA-3.0 op without a POWER9 dispatch
  # gate, it SIGILLs here. No 100% coverage gate: on POWER8 a properly-gated kernel
  # takes the scalar fallback (kernel branch uncovered, ~93%); coverage is enforced
  # by the POWER9 `emulated` lane. The contract here is "must not SIGILL on POWER8".
  emulated-ppc64le-power8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: docker run --privileged --rm tonistiigi/binfmt --install all
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=ppc64le go test -c -cover -o /tmp/t.test .
      - name: run ppc64le binary on POWER8 (must not SIGILL)
        run: docker run --rm --platform linux/ppc64le -e QEMU_CPU=power8 -v /tmp:/t debian:trixie /t/t.test -test.v
